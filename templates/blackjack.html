<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Blackjack — Live Millionaires</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1e2530; --border:#2a313d;
    --text:#e8e9ed; --muted:#8a8fa3; --accent:#5b8cff;
    --green:#2ecc71; --red-c:#e64545; --gold:#ffc857;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
  .brand { font-weight:700; font-size:18px; }
  .links { display:flex; gap:14px; }
  header a { color:var(--accent); text-decoration:none; font-size:13px; }
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  #lobby-view { display:block; }
  #game-view { display:none; }

  .lobby-header { display:flex; align-items:center; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
  .lobby-header h1 { margin:0; font-size:20px; }
  .create-game-box { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .create-game-box label { display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .create-game-box input { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:8px 10px; font-size:13px; width:120px; margin-bottom:10px; }
  .create-game-box button { background:var(--accent); color:white; border:none; border-radius:6px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }

  .game-layout { display:grid; grid-template-columns: 1fr 240px; gap:20px; }
  .game-board { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .game-side { display:flex; flex-direction:column; gap:14px; }

  .game-status { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px; }
  .status-label { font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .status-value { font-size:18px; font-weight:800; color:var(--gold); }

  .table-area { background: linear-gradient(135deg, #1a1f26 0%, #25262f 100%); border-radius:12px; border:2px solid #3a4050; padding:20px; min-height:280px; position:relative; margin-bottom:20px; display:flex; flex-direction:column; gap:20px; justify-content:center; }
  
  .bj-row { display:flex; flex-direction:column; gap:8px; }
  .bj-row h3 { margin:0; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
  
  .card-container { display:flex; flex-wrap:wrap; gap:10px; min-height:104px; align-items:center; }

  .card-visual { width:70px; height:104px; border-radius:14px; border:2px solid var(--border); background:linear-gradient(135deg, #fffdf5 0%, #f7f1d0 100%); color:#161b22; font-weight:800; font-size:18px; box-shadow:0 8px 16px rgba(0,0,0,.25); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px; position:relative; user-select:none; }
  .card-visual .card-rank { font-size:20px; line-height:1; }
  .card-visual .card-suit { font-size:24px; margin-top:4px; }
  .card-visual.red { color:#b42318; }
  .card-visual.black { color:#161b22; }
  .card-visual.hidden-card { background: linear-gradient(135deg, #2c3e50 0%, #0f171e 100%); border-color: var(--accent); color: var(--accent); }

  .hint-box { background:rgba(91,140,255,.12); border:1px solid rgba(91,140,255,.28); border-radius:10px; padding:10px 12px; font-size:12px; color:#dfe8ff; margin-bottom:10px; }
  
  .actions-box { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .actions-box h3 { font-size:12px; color:var(--muted); text-transform:uppercase; margin:0 0 10px; }
  .action-btn { width:100%; background:var(--accent); color:white; border:none; border-radius:6px; padding:8px; font-size:12px; font-weight:600; cursor:pointer; margin-bottom:6px; transition: opacity 0.2s; }
  .action-btn.success { background:var(--green); }
  .action-btn.danger { background:var(--red-c); }
  .action-btn:disabled { opacity:.3; cursor:not-allowed; }

  .message-box { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px; font-size:12px; color:var(--gold); text-align:center; }
  #error-toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#3a1c1c; color:#ff8a8a; border:1px solid #5a2a2a; padding:10px 18px; border-radius:8px; font-size:13px; display:none; z-index:50; }

  @media (max-width:900px) {
    .game-layout { grid-template-columns: 1fr; }
    .table-area { min-height:200px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">🃏 Blackjack — Live Millionaires</div>
  <div class="links">
    <a href="/">🎡 Roulette</a>
    <a href="/dashboard.html">📊 Dashboard</a>
  </div>
</header>

<main>
  <div id="lobby-view">
    <div class="lobby-header">
      <h1>💰 Blackjack Tisch</h1>
      <div class="create-game-box">
        <label>Dein Einsatz</label>
        <input type="number" id="bet-amount" value="50" min="10" max="10000">
        <button onclick="startGame()">Spiel starten</button>
      </div>
    </div>
  </div>

  <div id="game-view">
    <div class="game-layout">
      <div class="game-board">
        <div class="game-status">
          <div class="status-label">Aktueller Status</div>
          <div class="status-value" id="game-message">Spielen...</div>
        </div>

        <div class="table-area">
          <div class="bj-row">
            <h3 id="dealer-score-label">Dealer: —</h3>
            <div class="card-container" id="dealer-cards"></div>
          </div>
          <hr style="border:0; border-top:1px dashed var(--border); margin:10px 0;">
          <div class="bj-row">
            <h3 id="player-score-label">Deine Hand: —</h3>
            <div class="card-container" id="player-cards"></div>
          </div>
        </div>
      </div>

      <div class="game-side">
        <div class="message-box" id="bet-info">Einsatz: 0 Coins</div>
        <div class="hint-box">Wähle Hit für eine weitere Karte oder Stand um zu halten.</div>

        <div class="actions-box">
          <h3>Optionen</h3>
          <button class="action-btn success" id="btn-hit" onclick="hitCard()">🟢 Hit (Karte)</button>
          <button class="action-btn danger" id="btn-stand" onclick="standHand()">🔴 Stand (Halten)</button>
          <button class="action-btn" id="btn-leave" onclick="backToLobby()" style="margin-top:12px; background:var(--panel2); border:1px solid var(--border);">← Beenden</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="error-toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
const me = JSON.parse(localStorage.getItem('roulette_user') || 'null');
if (!me) window.location.href = '/';

let socket;
let currentGameId = null;

function showError(msg) {
  const toast = document.getElementById('error-toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2500);
}

function connectSocket() {
  socket = io();
  socket.on('connect', () => {
    socket.emit('identify', me.id);
  });
  socket.on('bj:gameState', renderGameState);
  socket.on('bj:error', showError);
}

function startGame() {
  const betInput = document.getElementById('bet-amount');
  if (!betInput) return;
  const bet = parseInt(betInput.value, 10);
  if (isNaN(bet) || bet < 10) { 
    showError('Der Einsatz muss mindestens 10 Coins betragen.'); 
    return; 
  }
  socket.emit('bj:createGame', { bet: bet });
}

function hitCard() {
  if (!currentGameId) return;
  socket.emit('bj:hit', { gameId: currentGameId });
}

function standHand() {
  if (!currentGameId) return;
  socket.emit('bj:stand', { gameId: currentGameId });
}

function calcScore(hand) {
  let score = 0;
  let aces = 0;
  for (let card of hand) {
    if (['J', 'Q', 'K'].includes(card.r)) score += 10;
    else if (card.r === 'A') { score += 11; aces += 1; }
    else score += parseInt(card.r, 10);
  }
  while (score > 21 && aces > 0) { score -= 10; aces -= 1; }
  return score;
}

function generateCardHtml(card, hide = false) {
  if (hide) {
    return `<div class="card-visual hidden-card"><span class="card-rank">?</span><span class="card-suit">♣️</span></div>`;
  }
  const isRed = card.s === '♥' || card.s === '♦';
  return `<div class="card-visual ${isRed ? 'red' : 'black'}"><span class="card-rank">${card.r}</span><span class="card-suit">${card.s}</span></div>`;
}

function renderGameState(game) {
  if (!game) return;
  currentGameId = game.id;

  document.getElementById('lobby-view').style.display = 'none';
  document.getElementById('game-view').style.display = 'block';
  document.getElementById('bet-info').textContent = `Einsatz: ${game.player.bet} Coins`;

  const pCardsDiv = document.getElementById('player-cards');
  pCardsDiv.innerHTML = game.player.hand.map(c => generateCardHtml(c)).join('');
  const pScore = calcScore(game.player.hand);
  document.getElementById('player-score-label').textContent = `Deine Hand: ${pScore}`;

  const dCardsDiv = document.getElementById('dealer-cards');
  if (game.state === 'playing') {
    dCardsDiv.innerHTML = generateCardHtml(game.dealer[0]) + generateCardHtml(null, true);
    document.getElementById('dealer-score-label').textContent = `Dealer: Sichtbar ${calcScore([game.dealer[0]])}`;
    document.getElementById('game-message').textContent = 'Du bist am Zug!';
    document.getElementById('btn-hit').disabled = false;
    document.getElementById('btn-stand').disabled = false;
  } else {
    dCardsDiv.innerHTML = game.dealer.map(c => generateCardHtml(c)).join('');
    const dScore = calcScore(game.dealer);
    document.getElementById('dealer-score-label').textContent = `Dealer: ${dScore}`;
    document.getElementById('btn-hit').disabled = true;
    document.getElementById('btn-stand').disabled = true;

    if (game.player.status === 'won') {
      document.getElementById('game-message').textContent = `🎉 Gewonnen! (+${game.player.bet * 2} Coins)`;
    } else if (game.player.status === 'tie') {
      document.getElementById('game-message').textContent = `🤝 Unentschieden (Einsatz zurück)`;
    } else {
      document.getElementById('game-message').textContent = `💥 Verloren! (Dealer gewinnt)`;
    }
  }
}

function backToLobby() {
  currentGameId = null;
  document.getElementById('lobby-view').style.display = 'block';
  document.getElementById('game-view').style.display = 'none';
}

connectSocket();
</script>
</body>
</html>

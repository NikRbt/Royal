<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Durak — Live Millionaires</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1e2530; --border:#2a313d;
    --text:#e8e9ed; --muted:#8a8fa3; --accent:#5b8cff;
    --green:#2ecc71; --red-c:#e64545; --gold:#ffc857;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
  .brand { font-weight:700; font-size:18px; }
  .links { display:flex; gap:14px; }
  header a { color:var(--accent); text-decoration:none; font-size:13px; }
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  #login-check { display:none; }
  #lobby-view { display:none; }
  #game-view { display:none; }

  .lobby-header { display:flex; align-items:center; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
  .lobby-header h1 { margin:0; font-size:20px; }
  .create-game-box { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .create-game-box label { display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .create-game-box input { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:8px 10px; font-size:13px; width:120px; margin-bottom:10px; }
  .create-game-box button { background:var(--accent); color:white; border:none; border-radius:6px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }

  .lobbies-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:12px; }
  .lobby-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px; cursor:pointer; transition:all .2s; }
  .lobby-card:hover { border-color:var(--accent); background:var(--panel2); }
  .lobby-card .name { font-weight:700; margin-bottom:8px; }
  .lobby-card .info { font-size:12px; color:var(--muted); }
  .lobby-card .info div { margin-bottom:4px; }
  .lobby-card .join-btn { background:var(--accent); color:white; border:none; border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; cursor:pointer; width:100%; margin-top:10px; }

  .game-layout { display:grid; grid-template-columns: 1fr 240px; gap:20px; }
  .game-board { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .game-side { display:flex; flex-direction:column; gap:14px; }

  .game-status { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px; }
  .status-label { font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .status-value { font-size:18px; font-weight:800; color:var(--gold); }

  .table-area { background: linear-gradient(135deg, #1a1f26 0%, #25262f 100%); border-radius:12px; border:2px solid #3a4050; padding:20px; min-height:280px; position:relative; margin-bottom:20px; }
  .trump-display { position:absolute; top:10px; right:10px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:12px; }
  .trump-display .lbl { color:var(--muted); font-size:10px; text-transform:uppercase; }
  .trump-display .card { font-size:20px; font-weight:800; }

  .table-pairs { display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start; justify-content:center; min-height:180px; align-content:center; }
  .card-pair { display:flex; gap:-8px; position:relative; }
  .card-visual { width:60px; height:88px; border-radius:8px; border:2px solid; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; cursor:default; user-select:none; }
  .card-visual.red { background:#e64545; border-color:#ff6b6b; color:white; }
  .card-visual.black { background:#1c1f26; border-color:#555; color:white; }
  .card-visual.defended { opacity:0.6; }

  .my-hand-box { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .my-hand-box h3 { font-size:12px; color:var(--muted); text-transform:uppercase; margin:0 0 10px; }
  .my-hand { display:flex; flex-wrap:wrap; gap:8px; }
  .card-btn { width:50px; height:74px; border-radius:6px; border:2px solid var(--border); background:var(--panel); color:var(--text); font-weight:700; font-size:16px; cursor:pointer; transition:all .15s; }
  .card-btn:hover { border-color:var(--accent); background:var(--panel2); }
  .card-btn.selected { border-color:var(--gold); background:#332b14; }

  .players-list { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .players-list h3 { font-size:12px; color:var(--muted); text-transform:uppercase; margin:0 0 10px; }
  .player-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .player-row:last-child { border-bottom:none; }
  .player-name { flex:1; }
  .player-status { font-size:10px; color:var(--muted); }
  .player-cards { color:var(--gold); font-weight:700; }
  .role-badge { font-size:10px; color:var(--gold); background:#332b14; padding:1px 5px; border-radius:3px; }

  .actions-box { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .actions-box h3 { font-size:12px; color:var(--muted); text-transform:uppercase; margin:0 0 10px; }
  .action-btn { width:100%; background:var(--accent); color:white; border:none; border-radius:6px; padding:8px; font-size:12px; font-weight:600; cursor:pointer; margin-bottom:6px; }
  .action-btn.danger { background:var(--red-c); }
  .action-btn:disabled { opacity:.5; cursor:default; }

  .message-box { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px; font-size:12px; color:var(--gold); text-align:center; }

  #error-toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#3a1c1c; color:#ff8a8a; border:1px solid #5a2a2a; padding:10px 18px; border-radius:8px; font-size:13px; display:none; z-index:50; }

  @media (max-width:900px) {
    .game-layout { grid-template-columns: 1fr; }
    .table-area { min-height:200px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">♠️ Durak — Live Millionaires</div>
  <div class="links">
    <a href="/">🎡 Roulette</a>
    <a href="/dashboard.html">📊 Dashboard</a>
  </div>
</header>

<main>
  <div id="login-check" style="text-align:center; padding:40px; color:var(--muted);">Lädt...</div>

  <div id="lobby-view">
    <div class="lobby-header">
      <h1>🎴 Durak Lobby</h1>
      <div class="create-game-box">
        <label>Einsatz pro Spieler</label>
        <input type="number" id="bet-amount" value="50" min="10" max="10000">
        <button onclick="createGame()">Spiel erstellen</button>
      </div>
    </div>
    <h2 style="margin-bottom:16px; font-size:14px; color:var(--muted); text-transform:uppercase;">Verfügbare Spiele</h2>
    <div class="lobbies-grid" id="lobbies-grid"></div>
  </div>

  <div id="game-view">
    <div class="game-layout">
      <div class="game-board">
        <div class="game-status">
          <div class="status-label" id="game-phase">Phase</div>
          <div class="status-value" id="game-message">—</div>
        </div>

        <div class="table-area">
          <div class="trump-display">
            <div class="lbl">Trump</div>
            <div class="card" id="trump-card">♠</div>
          </div>
          <div class="table-pairs" id="table-pairs"></div>
        </div>

        <div class="my-hand-box">
          <h3>Meine Hand</h3>
          <div class="my-hand" id="my-hand"></div>
        </div>
      </div>

      <div class="game-side">
        <div class="message-box" id="message-box">Warte auf andere Spieler...</div>

        <div class="players-list">
          <h3>Spieler</h3>
          <div id="players-info"></div>
        </div>

        <div class="actions-box" id="actions-box">
          <h3>Aktionen</h3>
          <button class="action-btn" id="action-end-round" style="display:none;">✅ Runde beenden</button>
          <button class="action-btn danger" id="action-take" style="display:none;">📥 Karten aufnehmen</button>
          <button class="action-btn" onclick="backToLobby()">← Zurück</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="error-toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
const me = JSON.parse(localStorage.getItem('roulette_user') || 'null');
if (!me) window.location.href = '/';

let socket;
let currentGame = null;
let currentGameState = null;
let selectedCard = null;

function showError(msg) {
  const toast = document.getElementById('error-toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2500);
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function connectSocket() {
  socket = io();
  socket.on('connect', () => {
    showLobby();
    socket.emit('durak:listLobbies');
  });
  socket.on('durak:lobbies', renderLobbies);
  socket.on('durak:error', showError);
  socket.on('durak:gameCreated', data => {
    currentGame = data.game_id;
    waitForGameStart();
  });
  socket.on('durak:gameState', renderGameState);
  socket.on('durak:myHand', renderMyHand);
}

function showLobby() {
  document.getElementById('login-check').style.display = 'none';
  document.getElementById('lobby-view').style.display = 'block';
  document.getElementById('game-view').style.display = 'none';
  socket.emit('durak:listLobbies');
}

function renderLobbies(lobbies) {
  const grid = document.getElementById('lobbies-grid');
  if (!lobbies.length) {
    grid.innerHTML = '<p style="color:var(--muted);">Noch keine Spiele. Erstelle eines oben!</p>';
    return;
  }
  grid.innerHTML = lobbies.map(lobby => `
    <div class="lobby-card">
      <div class="name">Durak</div>
      <div class="info">
        <div>🎯 Spieler: ${lobby.player_count}/4</div>
        <div>🪙 Einsatz: ${lobby.bet_amount}</div>
      </div>
      <button class="join-btn" onclick="joinGame('${lobby.id}')">Beitreten</button>
    </div>
  `).join('');
}

function createGame() {
  const bet = parseInt(document.getElementById('bet-amount').value, 10);
  if (bet < 10) { showError('Einsatz muss mindestens 10 sein'); return; }
  socket.emit('durak:createGame', { bet_amount: bet });
}

function joinGame(gameId) {
  socket.emit('durak:joinGame', { game_id: gameId });
  currentGame = gameId;
  waitForGameStart();
}

function waitForGameStart() {
  document.getElementById('lobby-view').style.display = 'none';
  document.getElementById('game-view').style.display = 'block';
  document.getElementById('message-box').textContent = '⏳ Warte auf andere Spieler...';
}

function renderGameState(state) {
  currentGameState = state;
  document.getElementById('game-phase').textContent = state.state === 'playing' ? '🎮 Im Spiel' : '✅ Vorbei';
  document.getElementById('game-message').textContent = state.message || 'Spielen...';

  const trumpCard = state.trump_card;
  if (trumpCard) {
    document.getElementById('trump-card').textContent = `${trumpCard.rank}${trumpCard.suit}`;
  }

  renderTable(state.table);
  renderPlayersInfo(state.players, state.attacker_idx, state.defender_idx);
}

function renderTable(table) {
  const pairsDiv = document.getElementById('table-pairs');
  if (!table.length) {
    pairsDiv.innerHTML = '<p style="color:var(--muted); font-size:13px;">Tisch leer...</p>';
    return;
  }
  pairsDiv.innerHTML = table.map((pair, i) => {
    const [attack, defend] = pair;
    const isRed = attack.suit === '♥' || attack.suit === '♦';
    return `
      <div class="card-pair">
        <div class="card-visual ${isRed ? 'red' : 'black'}">
          ${attack.rank}${attack.suit}
        </div>
        ${defend ? `<div class="card-visual ${defend.suit === '♥' || defend.suit === '♦' ? 'red' : 'black'} defended" style="margin-left:-20px;">
          ${defend.rank}${defend.suit}
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function renderMyHand(cards) {
  const handDiv = document.getElementById('my-hand');
  handDiv.innerHTML = cards.map(card => {
    const cardStr = `${card.rank}${card.suit}`;
    const isSelected = selectedCard === cardStr;
    return `
      <button class="card-btn ${isSelected ? 'selected' : ''}" data-card="${cardStr}" onclick="selectCard('${cardStr}', event)">
        ${card.rank}${card.suit}
      </button>
    `;
  }).join('');
}

function selectCard(cardStr, e) {
  e.preventDefault();
  if (selectedCard === cardStr) {
    selectedCard = null;
    e.target.classList.remove('selected');
  } else {
    document.querySelectorAll('.card-btn.selected').forEach(b => b.classList.remove('selected'));
    selectedCard = cardStr;
    e.target.classList.add('selected');
  }
}

function renderPlayersInfo(players, attackerIdx, defenderIdx) {
  const info = document.getElementById('players-info');
  const myPlayerIdx = players.findIndex(p => p.id === me.id);
  
  info.innerHTML = players.map((p, i) => {
    let role = '👤 Zuschauer';
    if (i === attackerIdx) role = '🎯 Angreifer';
    else if (i === defenderIdx) role = '🛡️ Verteidiger';
    
    return `
      <div class="player-row">
        <div class="player-name">${escapeHtml(p.name)}</div>
        <div class="role-badge">${role}</div>
        <div class="player-cards">${p.card_count}🎴</div>
      </div>
    `;
  }).join('');
}

function backToLobby() {
  currentGame = null;
  currentGameState = null;
  selectedCard = null;
  socket.emit('durak:listLobbies');
  showLobby();
}

connectSocket();
</script>
</body>
</html>
